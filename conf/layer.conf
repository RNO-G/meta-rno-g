# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-rno-g"
BBFILE_PATTERN_meta-rno-g = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-rno-g = "60"

LAYERDEPENDS_meta-rno-g = "phytec openembedded-layer ampliphy"
LAYERSERIES_COMPAT_meta-rno-g = "scarthgap"
